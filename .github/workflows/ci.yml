name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build --wheel

      - name: Install package
        run: uv pip install dist/*.whl
        shell: bash

      - name: Run tests
        if: runner.os != 'Windows'
        run: uv run pytest tests/ -v -k "not examples"

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: uv run pytest tests/ -v -k "not examples" --ignore=tests/examples/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build --wheel

      - name: Install package
        run: uv pip install dist/*.whl
        shell: bash

      - name: Run tests with coverage
        run: uv run pytest tests/ -v -k "not examples" --cov=cymongoose --cov-report=term-missing --cov-fail-under=80

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build with ASAN
        run: SKBUILD_CMAKE_DEFINE="USE_ASAN=ON" uv sync --reinstall-package cymongoose

      - name: Run tests with ASAN
        env:
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libasan.so.8
          ASAN_OPTIONS: detect_leaks=0:allocator_may_return_null=1:halt_on_error=1
        run: uv run pytest tests/ -v -x --tb=short -k "not examples"

  network-tests:
    name: Network Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build --wheel

      - name: Install package
        run: uv pip install dist/*.whl
        shell: bash

      - name: Run network tests (DNS, SNTP)
        run: uv run pytest tests/ -v -m network --tb=short

  load-test:
    name: Load Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build --wheel

      - name: Install package
        run: uv pip install dist/*.whl
        shell: bash

      - name: Sequential benchmark (1000 requests)
        run: uv run python tests/benchmarks/quick_bench.py

      - name: Concurrent load test (5000 requests, 50 concurrent)
        run: uv run python tests/benchmarks/simple_load_test.py

  examples:
    name: Example Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build --wheel

      - name: Install package
        run: uv pip install dist/*.whl
        shell: bash

      - name: Run example tests
        run: uv run pytest tests/examples/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run linter
        run: uv run ruff check src/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run type checker
        run: uv run mypy src/ --ignore-missing-imports
